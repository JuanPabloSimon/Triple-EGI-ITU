apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-egress
  namespace: inventario
spec:
  podSelector:
    matchLabels:
      app: inventario-web
  policyTypes: [Egress]
  egress:
    # Permite hablar con MongoDB (pod interno)
    - to:
        - podSelector:
            matchLabels:
              app: inventario-db
      ports:
        - port: 27017
          protocol: TCP
    # Permite hablar con SQL Server externo (VM Windows)
    - to:
        - ipBlock:
            cidr: 192.168.10.0/24
      ports:
        - port: 1433
          protocol: TCP
        - port: 389
          protocol: TCP
        - port: 636
          protocol: TCP
    # DNS del cluster
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
